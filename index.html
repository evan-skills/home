<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穿林Evan's Home</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fdfdfd;
  --bg-secondary: #f7f7f7;
  --text: #333;
  --text-light: #777;
  --text-lighter: #aaa;
  --accent: #4a7d8c;
  --accent-hover: #3a6a78;
  --accent-light: #e8f0f2;
  --border: #eaeaea;
  --radius: 4px;
  --toc-width: 210px;
}

html { scroll-behavior: smooth; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 14.5px;
}

a { color: var(--accent); text-decoration: none; cursor: pointer; transition: color 0.15s; }
a:hover { color: var(--accent-hover); }

/* ===== Top Nav ===== */
.top-nav {
  background: #fff;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 200;
}
.top-nav-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 30px;
}
.nav-logo { font-size: 13px; font-weight: 700; color: var(--text); }
.nav-logo em { font-style: normal; color: var(--accent); }
.nav-links { display: flex; list-style: none; gap: 2px; }
.nav-links a {
  display: block; padding: 4px 10px; border-radius: var(--radius);
  font-size: 12px; color: var(--text-light);
}
.nav-links a:hover, .nav-links a.active { color: var(--accent); background: var(--accent-light); }

/* ===== Page Switch ===== */
.page { display: none; }
.page.active { display: block; }

/* ===== Home ===== */
.home-page { max-width: 600px; margin: 0 auto; padding: 80px 24px; text-align: center; }
.home-title { font-size: 36px; font-weight: 800; color: #222; margin-bottom: 8px; }
.home-title em { font-style: normal; color: var(--accent); }
.home-tagline { font-size: 14px; color: var(--text-light); }

/* ===== Skills Layout ===== */
.skills-wrap { position: relative; min-height: calc(100vh - 30px); }

/* ---- Floating Sidebar ---- */
.skills-sidebar {
  position: fixed; top: 30px; left: 0; bottom: 0;
  width: 220px; z-index: 150;
  background: #fff;
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 12px rgba(0,0,0,0.06);
  overflow-y: auto; padding: 10px 0;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
}
.skills-sidebar.open { transform: translateX(0); }
.skills-sidebar::-webkit-scrollbar { width: 4px; }
.skills-sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

/* Sidebar toggle handle — a thin tab on the left edge */
.sidebar-handle {
  position: fixed; top: 50%; left: 0; z-index: 151;
  width: 18px; height: 60px;
  background: #fff;
  border: 1px solid var(--border); border-left: none;
  border-radius: 0 6px 6px 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-lighter);
  transition: left 0.25s ease;
  box-shadow: 2px 0 8px rgba(0,0,0,0.04);
}
.sidebar-handle.out { left: 220px; }
.sidebar-handle:hover { color: var(--accent); }

.toc-item {
  display: block; padding: 5px 16px 5px 16px;
  font-size: 12px; color: var(--text-light); cursor: pointer;
  border-left: 2px solid transparent;
  transition: all 0.12s;
}
.toc-item:hover { color: var(--accent); background: var(--accent-light); }
.toc-item.active { color: var(--accent); background: var(--accent-light); border-left-color: var(--accent); font-weight: 600; }
.toc-item .dots { display: inline-flex; gap: 2px; margin-left: 6px; vertical-align: middle; }
.toc-item .dot { width: 5px; height: 5px; border-radius: 50%; background: #ddd; }
.toc-item .dot.on { background: var(--accent); }

/* ---- Content ---- */
.skills-content { max-width: 780px; margin: 0 auto; padding: 28px 36px 60px; }
.skills-content .empty { text-align: center; padding: 80px 20px; color: var(--text-lighter); font-size: 13.5px; }

.skill-detail h2 { font-size: 22px; font-weight: 700; color: #222; margin-bottom: 4px; }
.skill-detail .skill-byline { font-size: 13px; color: var(--text-light); margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
.skill-detail h3 { font-size: 15px; font-weight: 600; color: #222; margin: 22px 0 8px; }
.skill-detail h4 { font-size: 13.5px; font-weight: 600; color: var(--text); margin: 14px 0 6px; }
.skill-detail p { font-size: 13.5px; color: var(--text-light); margin-bottom: 8px; line-height: 1.8; }
.skill-detail ul { list-style: none; padding: 0; margin: 0 0 14px; }
.skill-detail li { position: relative; padding: 2px 0 2px 16px; font-size: 13px; color: var(--text-light); }
.skill-detail li::before { content: ''; position: absolute; left: 0; top: 10px; width: 5px; height: 5px; border-radius: 50%; background: var(--accent); opacity: 0.45; }
.skill-detail strong { color: var(--text); }

/* level bar */
.level-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.level-bar .lbl { font-size: 11px; color: var(--text-lighter); }
.level-bar .segs { display: flex; gap: 3px; }
.level-bar .seg { width: 26px; height: 4px; border-radius: 2px; background: #e0e0e0; }
.level-bar .seg.on { background: var(--accent); }

/* highlights */
.highs { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
.highs span { padding: 4px 12px; background: var(--accent-light); border-radius: 100px; font-size: 12px; color: var(--accent); font-weight: 500; }

/* tags */
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 14px 0; }
.tag { padding: 2px 9px; font-size: 11px; color: var(--text-light); background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 100px; }

/* links row */
.links-row { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }
.links-row a { font-size: 12px; }

/* ===== Mobile ===== */
@media (max-width: 768px) {
  .skills-sidebar { width: 230px; }
  .skills-content { padding: 20px 16px 40px; }
  .sidebar-handle { display: none; }
}
</style>
</head>
<body>

<!-- ===== Top Nav ===== -->
<nav class="top-nav">
  <div class="top-nav-inner">
    <a class="nav-logo" onclick="goPage('home')">穿林<em>-</em>Evan</a>
    <ul class="nav-links" id="navLinks">
      <li><a data-p="home" class="active" onclick="goPage('home')">首页</a></li>
      <li><a data-p="skills" onclick="goPage('skills')">skill集</a></li>
    </ul>
  </div>
</nav>

<!-- ===== Home Page ===== -->
<div class="page active" id="pg-home">
  <div class="home-page">
    <h1 class="home-title">穿林<em>'</em>s Home</h1>
    <p class="home-tagline">享受编程和技术所带来的快乐 — Coding Your Ambition</p>
  </div>
</div>

<!-- ===== Skills Page ===== -->
<div class="page" id="pg-skills">
  <div class="skills-wrap">
    <aside class="skills-sidebar" id="sidebar">
      <div id="toc"></div>
    </aside>
    <div class="sidebar-handle" id="sidebarHandle" title="skill 目录" onclick="toggleSidebar()">▶</div>
    <main class="skills-content" id="content">
      <div class="empty">加载中...</div>
    </main>
  </div>
</div>

<script>
// ============ Data ============
let DATA = [];
let curSkill = null;

// ============ Sidebar toggle ============
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const h  = document.getElementById('sidebarHandle');
  const open = sb.classList.toggle('open');
  h.classList.toggle('out', open);
  h.textContent = open ? '◀' : '▶';
}

// ============ Page switch ============
function goPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('pg-' + p).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => {
    a.classList.toggle('active', a.dataset.p === p);
  });
  if (p === 'skills' && DATA.length && !curSkill) firstSkill();
}

// ============ Fetch ============
fetch('/skills.json')
  .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.json(); })
  .then(d => { DATA = d; buildToc(); firstSkill(); })
  .catch(e => { document.getElementById('content').innerHTML = '<div class="empty">加载失败：' + e.message + '</div>'; });

function firstSkill() {
  if (DATA.length > 0) showSkill(DATA[0].id);
}

// ============ Build TOC ============
function buildToc() {
  let h = '';
  for (const s of DATA) {
    h += '<a class="toc-item" data-sid="' + esc(s.id) + '" onclick="showSkill(\'' + esc(s.id) + '\')">'
      + esc(s.icon||'') + ' ' + esc(s.name) + '<span class="dots">';
    for (let i = 0; i < 5; i++) h += '<span class="dot' + (i < s.level ? ' on' : '') + '"></span>';
    h += '</span></a>';
  }
  document.getElementById('toc').innerHTML = h;
}

// ============ Show skill ============
function showSkill(id) {
  curSkill = id;
  const s = DATA.find(x => x.id === id);
  if (!s) return;

  document.querySelectorAll('.toc-item').forEach(a => a.classList.remove('active'));
  const el = document.querySelector('[data-sid="' + esc(id) + '"]');
  if (el) el.classList.add('active');

  let o = '<div class="skill-detail">';
  o += '<h2>' + esc(s.icon||'') + ' ' + esc(s.name) + '</h2>';

  o += '<div class="level-bar"><span class="lbl">熟练度</span><span class="segs">';
  for (let i = 0; i < 5; i++) o += '<span class="seg' + (i < s.level ? ' on' : '') + '"></span>';
  o += '</span></div>';
  o += '<p class="skill-byline">' + esc(s.summary) + '</p>';

  if (s.highlights && s.highlights.length) {
    o += '<div class="highs">';
    for (const x of s.highlights) o += '<span>✦ ' + esc(x) + '</span>';
    o += '</div>';
  }

  if (s.content) o += s.content;

  if (s.tags && s.tags.length) {
    o += '<div class="tags">';
    for (const x of s.tags) o += '<span class="tag">' + esc(x) + '</span>';
    o += '</div>';
  }

  if (s.links && s.links.length) {
    o += '<div class="links-row">';
    for (const x of s.links) o += '<a href="' + esc(x.url) + '" target="_blank" rel="noopener">↗ ' + esc(x.text) + '</a>';
    o += '</div>';
  }

  o += '</div>';
  document.getElementById('content').innerHTML = o;
}

function esc(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>

</body>
</html>
